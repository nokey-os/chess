{% extends "base.html" %}
{% block content %}
<div class="card bg-dark text-light border-secondary">
    <div class="card-body">
        <h5 class="card-title text-info mb-3">Лобби — ожидающие соперника</h5>
        {% if games %}
        <ul class="list-group list-group-flush">
            {% for g in games %}
            <li class="list-group-item bg-dark text-light border-secondary d-flex justify-content-between align-items-center">
                <span>{{ g.white_player.username }} ждёт соперника</span>
                <form method="POST" action="{{ url_for('join_game', game_id=g.id) }}">
                    <button type="submit" class="btn btn-success btn-sm">Присоединиться</button>
                </form>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="text-secondary text-center mb-0 py-3">Нет доступных игр. Создайте свою!</p>
        {% endif %}
    </div>
</div>
{% endblock %}
