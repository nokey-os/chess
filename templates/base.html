<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Шахматы</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4 px-3">
        <span class="navbar-brand mb-0 h1">♚ Шахматы</span>
        <ul class="navbar-nav ms-auto">
            {% if session.user_id %}
            <li class="nav-item"><span class="nav-link text-info fw-bold">{{ session.username }}</span></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Главная</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('lobby') }}">Лобби</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="{{ url_for('logout') }}">Выйти</a></li>
            {% endif %}
        </ul>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-danger alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
